# general settings
name: 250321_ovsr_lhr_deform_conv
model_type: VideoRecurrentModel
scale: 4
num_gpu: auto  # official: 2 GPUs
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: REDS
    type: REDSRecurrentPriorDataset
    dataroot_gt: REDS/train/sharp
    dataroot_lq: REDS/train/deLR
    dataroot_mv: REDS/train/mvs
    meta_info_file: OVSR/basicsr/data/meta_info/meta_info_REDS_GT.txt
    val_partition: REDS4  # set to 'official' when use the official validation partition
    test_mode: False
    io_backend:
      type: disk

    num_frame: 25
    gt_size: 256
    interval_list: [1]
    random_reverse: false
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 32
    batch_size_per_gpu: 8
#    batch_size_per_gpu: 1 # only for testing code
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
    pin_memory: True

  val:
    name: REDS4
    type: VideoRecurrentPriorTestDataset
    dataroot_gt: REDS/REDS4/GT
    dataroot_lq: REDS/REDS4/deLR
    dataroot_mv: REDS/REDS4/mvs

    cache_data: true
    io_backend:
     type: disk

    num_frame: -1


# network structures
network_g:
  type: OVSR
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 32
  num_frame: 25
  num_extract_block: 3
  num_reconstruct_block: 10
  center_frame_idx: None
  hr_in: False

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [300000]
    restart_weights: [1]
    eta_min: !!float 1e-7
    # type: MultiStepRestartLR
    # milestones: [20000,40000]
    # gamma: 0.1

  total_iter: 300000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false


# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500

find_unused_parameters: true
